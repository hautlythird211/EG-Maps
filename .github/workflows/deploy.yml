name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm generate
        env:
          NUXT_APP_BASE_URL: /EG-Maps/

      - name: Restructure output for GitHub Pages
        run: |
          mkdir -p .output/public/EG-Maps
          cd .output/public && find . -maxdepth 1 -not -name '.' -not -name 'EG-Maps' -exec mv {} EG-Maps/ \;

      - name: Verify output
        run: |
          echo "Output directory contents:"
          ls -la .output/public
          echo "EG-Maps directory contents:"
          ls -la .output/public/EG-Maps
          echo "Build complete"

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  test:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm generate
        env:
          NUXT_APP_BASE_URL: /EG-Maps/

      - name: Restructure output for testing
        run: |
          mkdir -p .output/public/EG-Maps
          cd .output/public && find . -maxdepth 1 -not -name '.' -not -name 'EG-Maps' -exec mv {} EG-Maps/ \;

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium

      - name: Run Playwright tests
        run: pnpm exec playwright test --config=playwright.static.config.ts
        env:
          BASE_URL: http://localhost:3000/EG-Maps/

  deploy:
    needs: [build, test]
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
