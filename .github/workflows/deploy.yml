name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.0
          run_install: false

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            pnpm-${{ runner.os }}-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build species icon mapping (Game Icons SSG)
        run: node scripts/build-species-icon-mapping.mjs

      - name: Compute overlap indicators (P1.7)
        run: node scripts/compute-overlaps.mjs

      - name: Build static site
        run: pnpm generate
        env:
          NUXT_APP_BASE_URL: /EG-Maps/
          NUXT_PUBLIC_MAPTILER_API_KEY: ${{ secrets.NUXT_PUBLIC_MAPTILER_API_KEY }}

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Playwright E2E tests
        run: npx playwright test --config=playwright.config.ts tests/map-rendering.spec.ts
        env:
          CI: true

      - name: Copy 200.html as 404.html for SPA fallback
        run: |
          if [ -f .output/public/200.html ]; then
            cp .output/public/200.html .output/public/404.html
          elif [ -f .output/public/index.html ]; then
            cp .output/public/index.html .output/public/404.html
          else
            echo "Warning: No 200.html or index.html found for 404 fallback"
          fi

      - name: Verify .nojekyll present
        run: |
          if [ ! -f .output/public/.nojekyll ]; then
            echo "::error::.nojekyll missing from build output — _payload.json would be hidden by Jekyll"
            exit 1
          fi

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
