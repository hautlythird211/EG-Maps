name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: 10.12.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build static site
        run: pnpm generate
        env:
          NUXT_APP_BASE_URL: /EG-Maps/
          NUXT_PUBLIC_MAPTILER_API_KEY: ${{ secrets.NUXT_PUBLIC_MAPTILER_API_KEY }}

      - name: Restructure for GitHub Pages
        run: |
          mkdir -p .output/eg-maps/EG-Maps
          cp -r .output/public/* .output/eg-maps/EG-Maps/
          cp .output/public/200.html .output/eg-maps/EG-Maps/404.html 2>/dev/null || cp .output/public/index.html .output/eg-maps/EG-Maps/404.html 2>/dev/null || true

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: .output/eg-maps
          retention-days: 1

      - uses: actions/upload-pages-artifact@v3
        with:
          path: .output/eg-maps

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
